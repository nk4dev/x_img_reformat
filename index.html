<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
    }

    #img_url_result img {
        max-width: 100%;
        height: auto;
    }
</style>
<script>
    function getImageId() {
        const url = document.getElementById('img_url').value;
        const regex = /pbs\.twimg\.com\/media\/([^?]+)/;
        const match = url.match(regex);

        if (match) {
            return match[1];
        }
        return null;
    }
    function getRadioValue() {
        const radios = document.querySelectorAll('input[type="radio"]:checked');
        if (radios.length > 0) {
            console.log(radios[0].value);
            return radios[0].value;
        }
        return null;
    }
    document.getElementById('img_url').addEventListener('input', function () {
        const imageId = getImageId();
        const imgtype = getRadioValue();
        if (imageId) {
            document.getElementById('img_url_display').innerText = `https://pbs.twimg.com/media/${imageId}?format=${imgtype === 'orig' ? 'jpg&name=orig' : 'png'}`;
            if (document.getElementById('img_url_result').firstChild) {
                document.getElementById('img_url_result').removeChild(document.getElementById('img_url_result').firstChild);
            }
            const imgElement = document.createElement('img');
            if (imgtype === 'orig') {
                imgElement.src = `https://pbs.twimg.com/media/${imageId}?format=jpg&name=orig`;
            } else {
                imgElement.src = `https://pbs.twimg.com/media/${imageId}?format=png`;
            }
            imgElement.style.maxWidth = '100%';
            imgElement.style.height = 'auto';
            document.getElementById('img_url_result').appendChild(imgElement);
        } else {
            document.getElementById('img_url_result').innerHTML = 'Invalid image URL';
        }
    });
</script>
