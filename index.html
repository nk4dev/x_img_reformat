<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            xblue: "#1d9bf0",
            xdark: "#15202b",
            xdarker: "#0d1520",
          },
          animation: {
            "fade-in": "fadeIn 0.4s ease-out forwards",
            "slide-up": "slideUp 0.3s ease-out forwards",
            spin: "spin 1s linear infinite",
          },
          keyframes: {
            fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
            slideUp: {
              from: { opacity: 0, transform: "translateY(12px)" },
              to: { opacity: 1, transform: "translateY(0)" },
            },
            spin: { to: { transform: "rotate(360deg)" } },
          },
        },
      },
    };
  </script>
  <meta name="description" content="Extract and download images from X (Twitter) posts" />
  <link rel="canonical" href="https://nknighta.me/x_img_reformat/" />
  <meta property="og:title" content="X Image Extractor" />
  <meta property="og:description" content="Extract and download images from X (Twitter) posts instantly" />
  <meta property="og:image" content="https://ogp-img-gen.vercel.app/api/img-gen?text=X+Image+Extractor" />
  <meta property="og:url" content="https://nknighta.me/x_img_reformat/" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/x-icon" href="https://nk4dev.github.io/favicon.ico" />
  <title>X Image Extractor</title>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    /* Transitions for theme toggle */
    * {
      transition: background-color 0.2s ease, border-color 0.2s ease,
        color 0.2s ease;
    }

    /* Image card hover effect */
    .img-card:hover .img-overlay {
      opacity: 1;
    }

    .img-card .img-overlay {
      opacity: 0;
      transition: opacity 0.2s ease;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-xdark dark:text-gray-100">
  <!-- Header -->
  <header
    class="sticky top-0 z-50 border-b border-gray-200 bg-white/80 backdrop-blur-md dark:border-gray-700/50 dark:bg-xdark/80">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <!-- X Logo -->
        <svg viewBox="0 0 24 24" class="h-7 w-7 fill-current" aria-hidden="true">
          <path
            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
        </svg>
        <h1 class="text-lg font-bold tracking-tight">Image Extractor</h1>
        <a href="?fallback=1">
          Direct input URL
        </a>
      </div>
      <!-- Theme Toggle -->
      <button id="themeToggle" class="rounded-full p-2 hover:bg-gray-100 dark:hover:bg-gray-700/50"
        aria-label="Toggle theme">
        <!-- Sun icon (dark mode) -->
        <svg id="sunIcon" class="hidden h-5 w-5 dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- Moon icon (light mode) -->
        <svg id="moonIcon" class="block h-5 w-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-8">
    <!-- Image / Video Tab Section -->
    <div>
      <nav class="mb-6 flex items-center gap-4 border-b">
        <button id="imagesTab"
          class="border-b-2 border-xblue px-3 py-1 text-sm font-medium text-xblue focus:outline-none">
          Images
        </button>
        <button id="videosTab"
          class="border-b-2 border-transparent px-3 py-1 text-sm font-medium text-gray-500 hover:border-gray-300 hover:text-gray-700 focus:outline-none dark:text-gray-400 dark:hover:border-gray-600 dark:hover:text-gray-300">
          Videos
        </button>
      </nav>
    </div>
    <!-- Main Input Section -->
    <div id="imagesSection">
      <section class="mb-8">
        <label for="postUrlInput" class="mb-2 block text-sm font-medium text-gray-600 dark:text-gray-400">
          X (Twitter) Post URL
        </label>
        <div class="flex gap-2">
          <input type="url" id="postUrlInput" placeholder="https://x.com/user/status/123456789..."
            class="flex-1 rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm shadow-sm placeholder:text-gray-400 focus:border-xblue focus:outline-none focus:ring-2 focus:ring-xblue/30 dark:border-gray-600 dark:bg-xdarker dark:placeholder:text-gray-500"
            autofocus />
          <button id="pasteBtn" type="button"
            class="inline-flex items-center rounded-xl border border-gray-300 bg-white px-3 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-xblue/30 dark:border-gray-600 dark:bg-xdarker dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200"
            title="Paste from clipboard">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </button>
          <button id="extractBtn"
            class="inline-flex items-center gap-2 rounded-xl bg-xblue px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-xblue/90 focus:outline-none focus:ring-2 focus:ring-xblue/50 disabled:cursor-not-allowed disabled:opacity-50">
            <!-- Default: Arrow icon -->
            <svg id="extractIcon" class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <!-- Spinner (hidden by default) -->
            <svg id="extractSpinner" class="hidden h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            <span id="extractBtnText">Extract</span>
          </button>
        </div>
        <p class="mt-1.5 text-xs text-gray-400 dark:text-gray-500">
          e.g. https://x.com/user/status/1234567890
        </p>
      </section>

      <!-- Format Selection -->
      <section class="mb-6">
        <fieldset class="flex items-center gap-4">
          <legend class="mr-2 text-sm font-medium text-gray-600 dark:text-gray-400">
            Format:
          </legend>
          <label class="inline-flex cursor-pointer items-center gap-1.5 text-sm">
            <input type="radio" name="format" value="png" checked class="accent-xblue" />
            PNG
          </label>
          <label class="inline-flex cursor-pointer items-center gap-1.5 text-sm">
            <input type="radio" name="format" value="orig" class="accent-xblue" />
            Original (JPG)
          </label>
        </fieldset>
      </section>

      <!-- Status / Error Messages -->
      <div id="statusArea" class="mb-6 hidden rounded-xl border px-4 py-3 text-sm"></div>

      <!-- Image Results Grid -->
      <section id="resultsSection" class="mb-8 hidden">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-sm font-semibold text-gray-600 dark:text-gray-400">
            Extracted Images
            <span id="imageCount"
              class="ml-1.5 rounded-full bg-xblue/10 px-2 py-0.5 text-xs font-medium text-xblue"></span>
          </h2>
          <button id="downloadAllBtn"
            class="hidden inline-flex items-center gap-1.5 rounded-lg bg-gray-100 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download All
          </button>
        </div>
        <div id="imageGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2"></div>
      </section>

      <!-- Fallback: Manual Image URL Input (collapsible) -->
      <section id="fallbackSection" class="mb-8 hidden">
        <button id="fallbackToggle"
          class="flex w-full items-center gap-2 rounded-xl border border-dashed border-gray-300 px-4 py-3 text-left text-sm text-gray-500 hover:border-gray-400 hover:text-gray-600 dark:border-gray-600 dark:text-gray-400 dark:hover:border-gray-500 dark:hover:text-gray-300">
          <svg id="fallbackChevron" class="h-4 w-4 transition-transform" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          Enter image URL directly (Fallback)
        </button>
        <div id="fallbackPanel" class="mt-3 hidden space-y-3">
          <div>
            <label for="manualImgUrl" class="mb-1 block text-xs text-gray-500 dark:text-gray-400">
              pbs.twimg.com Image URL
            </label>
            <input type="url" id="manualImgUrl" placeholder="https://pbs.twimg.com/media/IMG_ID?format=jpg"
              class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm placeholder:text-gray-400 focus:border-xblue focus:outline-none focus:ring-2 focus:ring-xblue/30 dark:border-gray-600 dark:bg-xdarker dark:placeholder:text-gray-500" />
          </div>
          <div>
            <label for="manualPostUrl" class="mb-1 block text-xs text-gray-500 dark:text-gray-400">
              X Post URL (optional, for filename generation)
            </label>
            <input type="url" id="manualPostUrl" placeholder="https://x.com/user/status/123..."
              class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm placeholder:text-gray-400 focus:border-xblue focus:outline-none focus:ring-2 focus:ring-xblue/30 dark:border-gray-600 dark:bg-xdarker dark:placeholder:text-gray-500" />
          </div>
          <div class="flex gap-2">
            <button id="manualPreviewBtn"
              class="rounded-lg bg-gray-200 px-4 py-2 text-sm font-medium hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600">
              Preview
            </button>
            <button id="manualDownloadBtn"
              class="rounded-lg bg-xblue px-4 py-2 text-sm font-medium text-white hover:bg-xblue/90">
              Download
            </button>
          </div>
          <div id="manualPreviewArea"></div>
        </div>
      </section>
    </div>
    <!-- image section end -->

    <!-- video section -->
    <div id="videosSection" class="hidden">
      <!-- Video URL Input -->
      <section class="mb-8">
        <label for="videoUrlInput" class="mb-2 block text-sm font-medium text-gray-600 dark:text-gray-400">
          X (Twitter) Post URL
        </label>
        <div class="flex gap-2">
          <input type="url" id="videoUrlInput" placeholder="https://x.com/user/status/123456789..."
            class="flex-1 rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm shadow-sm placeholder:text-gray-400 focus:border-xblue focus:outline-none focus:ring-2 focus:ring-xblue/30 dark:border-gray-600 dark:bg-xdarker dark:placeholder:text-gray-500" />
          <button id="videoPasteBtn" type="button"
            class="inline-flex items-center rounded-xl border border-gray-300 bg-white px-3 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-xblue/30 dark:border-gray-600 dark:bg-xdarker dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200"
            title="Paste from clipboard">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </button>
          <button id="videoExtractBtn"
            class="inline-flex items-center gap-2 rounded-xl bg-xblue px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-xblue/90 focus:outline-none focus:ring-2 focus:ring-xblue/50 disabled:cursor-not-allowed disabled:opacity-50">
            <svg id="videoExtractIcon" class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <svg id="videoExtractSpinner" class="hidden h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            <span id="videoExtractBtnText">Extract</span>
          </button>
        </div>
        <p class="mt-1.5 text-xs text-gray-400 dark:text-gray-500">
          e.g. https://x.com/user/status/1234567890
        </p>
      </section>

      <!-- Video Status -->
      <div id="videoStatusArea" class="mb-6 hidden rounded-xl border px-4 py-3 text-sm"></div>

      <!-- Video Results -->
      <section id="videoResultSection" class="mb-8 hidden">
        <h2 class="mb-4 text-sm font-semibold text-gray-600 dark:text-gray-400">
          Extracted Video
          <span id="videoCount"
            class="ml-1.5 rounded-full bg-xblue/10 px-2 py-0.5 text-xs font-medium text-xblue"></span>
        </h2>
        <div id="videoGrid" class="space-y-4"></div>
      </section>
    </div>
    <!-- video section end-->
  </main>

  <!-- Footer -->
  <footer
    class="border-t border-gray-200 py-6 text-center text-xs text-gray-400 dark:border-gray-700/50 dark:text-gray-500">
    &copy;
    <a href="https://nknighta.me/g" class="hover:text-xblue hover:underline">
      2025 Nknight AMAMIYA@nk4dev
    </a>
  </footer>

  <script src="/x_img_reformat/js/api.js"></script>
  <script src="/x_img_reformat/js/video.js"></script>
  <script src="/x_img_reformat/js/ui.js"></script>
</body>

</html>
